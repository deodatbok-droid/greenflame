name: Deploy to Vercel Production

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel production deployment
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.vercel.com/v13/deployments?projectId=${{ secrets.VERCEL_PROJECT_ID }}" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "greenflame",
              "target": "production",
              "gitSource": {
                "type": "github",
                "repoId": ${{ secrets.VERCEL_REPO_ID }},
                "ref": "master"
              }
            }')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Status: $HTTP_CODE"
          echo "$BODY" | python3 -c "import json,sys; d=json.load(sys.stdin); print('Deployment ID:', d.get('id','')); print('State:', d.get('readyState',''))" 2>/dev/null || echo "$BODY"
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "Deploy failed with HTTP $HTTP_CODE"
            exit 1
          fi
